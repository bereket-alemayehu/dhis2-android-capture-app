name: Run Ethiopian Calendar Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      - name: Run Ethiopian Calendar Tests only
        run: ./gradlew commons:testDebugUnitTest --tests "org.dhis2.commons.date.DateUtilsEthiopianTest"

